arrangement-views: &arrangement-views
  dashboard:
    includeLiveDetail: false
    retrieveLiveData: ""
    categorizers:
      cat-savings-account-favorites: *cat-savings-account-favorites-ref
      cat-current-account-favorites: *cat-current-account-favorites-ref
      cat-debit-card-favorites: *cat-debit-card-favorites-ref
      cat-credit-card-favorites: *cat-credit-card-favorites-ref
      cat-loan-favorites: *cat-loan-favorites-ref
      cat-term-deposit-favorites: *cat-term-deposit-favorites-ref
      cat-investment-account-favorites: *cat-investment-account-favorites-ref
      cat-custom-product-kind-favorites: *cat-custom-product-kind-favorites-ref
      cat-savings-account-non-favorites: *cat-savings-account-non-favorites-ref
      cat-current-account-non-favorites: *cat-current-account-non-favorites-ref
      cat-debit-card-non-favorites: *cat-debit-card-non-favorites-ref
      cat-credit-card-non-favorites: *cat-credit-card-non-favorites-ref
      cat-loan-non-favorites: *cat-loan-non-favorites-ref
      cat-term-deposit-non-favorites: *cat-term-deposit-non-favorites-ref
      cat-investment-account-non-favorites: *cat-investment-account-non-favorites-ref
      cat-custom-product-kind-non-favorites: *cat-custom-product-kind-non-favorites-ref
    groups:
      favorites:
        categories:
          - cat-savings-account-favorites
          - cat-current-account-favorites
          - cat-debit-card-favorites
          - cat-credit-card-favorites
          - cat-loan-favorites
          - cat-term-deposit-favorites
          - cat-investment-account-favorites
          - cat-custom-product-kind-favorites
        limit: 5
        sort-by:
          - displayName
      non-favorites:
        categories:
          - cat-savings-account-non-favorites
          - cat-current-account-non-favorites
          - cat-debit-card-non-favorites
          - cat-credit-card-non-favorites
          - cat-loan-non-favorites
          - cat-term-deposit-non-favorites
          - cat-investment-account-non-favorites
          - cat-custom-product-kind-non-favorites
        limit: 5
        sort-by:
          - displayName
    balance-aggregations:
      all:
        cat-current-account-favorites: availableBalance
        cat-savings-account-favorites: availableBalance
        cat-credit-card-favorites: remainingCredit
        cat-loan-favorites: outstandingPrincipalAmount
        cat-term-deposit-favorites: bookedBalance
        cat-investment-account-favorites: currentInvestmentValue
        cat-custom-product-kind-favorites: bookedBalance
        cat-current-account-non-favorites: availableBalance
        cat-savings-account-non-favorites: availableBalance
        cat-credit-card-non-favorites: remainingCredit
        cat-loan-non-favorites: outstandingPrincipalAmount
        cat-term-deposit-non-favorites: bookedBalance
        cat-investment-account-non-favorites: currentInvestmentValue
        cat-custom-product-kind-non-favorites: bookedBalance
      savings:
        cat-savings-account-favorites: bookedBalance
        cat-savings-account-non-favorites: bookedBalance
      loans:
        cat-loan-favorites: outstandingPrincipalAmount
        cat-loan-non-favorites: outstandingPrincipalAmount
      current-accounts:
        cat-current-account-favorites: availableBalance
        cat-current-account-non-favorites: availableBalance
      credit-cards:
        cat-credit-card-favorites: remainingCredit
        cat-credit-card-non-favorites: remainingCredit
      investments:
        cat-investment-account-favorites: currentInvestmentValue
        cat-investment-account-non-favorites: currentInvestmentValue
      term-deposits:
        cat-term-deposit-favorites: bookedBalance
        cat-term-deposit-non-favorites: bookedBalance
      custom-product-kinds:
        cat-custom-product-kind-favorites: bookedBalance
        cat-custom-product-kind-non-favorites: bookedBalance

  all:
    includeLiveDetail: false
    retrieveLiveData: ""
    categorizers:
      cat-savings-account: *cat-savings-account-ref
      cat-current-account: *cat-current-account-ref
      cat-debit-card: *cat-debit-card-ref
      cat-credit-card: *cat-credit-card-ref
      cat-loan: *cat-loan-ref
      cat-term-deposit: *cat-term-deposit-ref
      cat-investment-account: *cat-investment-account-ref
      cat-custom-product-kind: *cat-custom-product-kind-ref
      cat-pocket-parent:
        expression: productKind.uri == 'pocket-parent'
    single-group:
      enable-if-below: 12
      sort-by:
        - displayName
    groups:
      current-accounts:
        categories:
          - cat-current-account
        limit: 5
        sort-by:
          - displayName
      savings-accounts: &group-savings-account-ref
        categories:
          - cat-savings-account
        limit: 5
        sort-by:
          - displayName
      term-deposits:
        categories:
          - cat-term-deposit
        limit: 5
        sort-by:
          - displayName
      loans:
        categories:
          - cat-loan
        limit: 5
        sort-by:
          - displayName
      credit-cards:
        categories:
          - cat-credit-card
        limit: 5
        sort-by:
          - displayName
      debit-cards:
        categories:
          - cat-debit-card
        limit: 5
        sort-by:
          - displayName
      investment-accounts:
        categories:
          - cat-investment-account
        limit: 5
        sort-by:
          - displayName
      custom-accounts:
        categories:
          - cat-custom-product-kind
      pocket-parents:
        categories:
          - cat-pocket-parent
        limit: 5
        sort-by:
          - displayName
    projections:
      currencies: $collect($cat_rows.![currency], $distinct(), $asc())
      productKindUris: $collect($rows.![productKind.uri], $distinct(), $asc())
      savings-accounts: $cat_rows.?[productKind.uri == 'savings-account'].size()
      current-accounts: $cat_rows.?[productKind.uri == 'current-account'].size()
      debit-cards: $cat_rows.?[productKind.uri == 'debit-card'].size()
      credit-cards: $cat_rows.?[productKind.uri == 'credit-card'].size()
      loans: $cat_rows.?[productKind.uri == 'loan'].size()
      term-deposits: $cat_rows.?[productKind.uri == 'term-deposit'].size()
      investment-accounts: $cat_rows.?[productKind.uri == 'investment-account'].size()
      favorite-accounts: $all_rows.?[userPreferences.favorite == true].size()
    balance-aggregations:
      all:
        cat-current-account: availableBalance
        cat-savings-account: availableBalance
        cat-credit-card: remainingCredit
        cat-loan: outstandingPrincipalAmount
        cat-term-deposit: bookedBalance
        cat-investment-account: currentInvestmentValue
        cat-custom-product-kind: bookedBalance

