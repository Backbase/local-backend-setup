global-mappings:
  - &user-preferences-mapping
    alias: userPreferences.alias
    favorite: userPreferences.favorite
    visible: userPreferences.visible

  - &basic-mapping
    '[currency]': currency
    '[displayName]': displayName
    '[productKindUri]': productKind.uri
    '[productKindName]': productKind.name
    '[state]': state.state
    '[legalEntities]':
      id: id
      name: name

  - &children-mappings
    '[debitCards]':
      id: cardId
      suffix: number
      expiration:
        attribute: expiryDate
        key: expiration.key
      addition-prop0: additions.prop0
      virtual: additions.virtual
    '[legalEntities]':
      id: id
    subscriptions:
      identifier: id

global-categorizers:
  - &cat-savings-account-favorites-ref
    expression:
      kind: all
      rules:
        - userPreferences.favorite == true
        - userPreferences.visible != false
        - productKind.uri == 'savings-account'
    mappings:
      <<: *basic-mapping
      <<: *user-preferences-mapping
      <<: *children-mappings
      '[primaryBalance]':
        attribute: availableBalance
        key: availableBalance
      '[accountNumber]':
        attribute: bban
        key: BBAN

  - &cat-current-account-favorites-ref
    expression:
      kind: all
      rules:
        - userPreferences.favorite == true
        - userPreferences.visible != false
        - productKind.uri == 'current-account'
    mappings:
      <<: *basic-mapping
      <<: *user-preferences-mapping
      <<: *children-mappings
      '[primaryBalance]':
        attribute: availableBalance
        key: availableBalance
      '[accountNumber]':
        attribute: bban
        key: BBAN

  - &cat-debit-card-favorites-ref
    expression:
      kind: all
      rules:
        - userPreferences.favorite == true
        - userPreferences.visible != false
        - productKind.uri == 'debit-card'
    mappings:
      <<: *basic-mapping
      <<: *user-preferences-mapping
      <<: *children-mappings
      '[accountNumber]':
        attribute: bban
        key: BBAN
      '[cardProvider]': cardDetails.cardProvider

  - &cat-credit-card-favorites-ref
    expression:
      kind: all
      rules:
        - userPreferences.favorite == true
        - userPreferences.visible != false
        - productKind.uri == 'credit-card'
    mappings:
      <<: *basic-mapping
      <<: *user-preferences-mapping
      <<: *children-mappings
      '[primaryBalance]':
        attribute: remainingCredit
        key: remainingCredit
      '[accountNumber]':
        attribute: panSuffix
        key: number
      '[cardProvider]': cardDetails.cardProvider

  - &cat-loan-favorites-ref
    expression:
      kind: all
      rules:
        - userPreferences.favorite == true
        - userPreferences.visible != false
        - productKind.uri == 'loan'
    mappings:
      <<: *basic-mapping
      <<: *user-preferences-mapping
      <<: *children-mappings
      '[primaryBalance]':
        attribute: outstandingPrincipalAmount
        key: outstandingPrincipalAmount
      '[accountNumber]':
        attribute: bban
        key: BBAN

  - &cat-term-deposit-favorites-ref
    expression:
      kind: all
      rules:
        - userPreferences.favorite == true
        - userPreferences.visible != false
        - productKind.uri == 'term-deposit'
    mappings:
      <<: *basic-mapping
      <<: *user-preferences-mapping
      <<: *children-mappings
      '[primaryBalance]':
        attribute: bookedBalance
